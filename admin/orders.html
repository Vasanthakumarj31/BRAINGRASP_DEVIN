<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — BrainGrasp Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{--bg:#0d1117;--surface:#161b27;--card:#1c2333;--border:rgba(255,255,255,.08);--blue:#4f7ef7;--orange:#f97316;--purple:#8b5cf6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
    /* Sidebar */
    .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:24px 20px;font-size:18px;font-weight:700;border-bottom:1px solid var(--border)}
    .sidebar-logo i{color:var(--blue);font-size:20px}
    .sidebar-nav{display:flex;flex-direction:column;padding:16px 12px;gap:4px;flex:1}
    .sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:.15s}
    .sidebar-nav a:hover{background:rgba(255,255,255,.05);color:var(--text)}
    .sidebar-nav a.active{background:rgba(79,126,247,.15);color:var(--blue)}
    .sidebar-nav a i{width:16px;text-align:center}
    .sidebar-nav .logout{color:#ef4444;margin-top:auto}
    .sidebar-nav .logout:hover{background:rgba(239,68,68,.1);color:#ef4444}
    /* Main */
    .main{flex:1;padding:28px 32px;overflow-y:auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .topbar-title{font-size:22px;font-weight:700}
    .topbar-sub{font-size:13px;color:var(--muted);margin-top:3px}
    .avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:grid;place-items:center;font-weight:700}
    /* Filters */
    .filters{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .filter-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:inherit}
    .filter-btn:hover,.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;flex:1;max-width:300px}
    .search-box i{color:var(--muted);font-size:13px}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:inherit}
    /* Table */
    .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
    td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02);cursor:pointer}
    .oid{font-weight:700;color:var(--blue)}
    .badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
    .b-placed{background:rgba(79,126,247,.15);color:var(--blue)}
    .b-confirmed{background:rgba(139,92,246,.15);color:var(--purple)}
    .b-shipped{background:rgba(234,179,8,.12);color:var(--yellow)}
    .b-delivered{background:rgba(34,197,94,.12);color:var(--green)}
    .b-cancelled{background:rgba(239,68,68,.12);color:var(--red)}
    .b-paid{background:rgba(20,184,166,.12);color:#14b8a6}
    .no-data{text-align:center;padding:40px;color:var(--muted)}
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:16px;border-top:1px solid var(--border)}
    .page-info{font-size:12px;color:var(--muted)}
    .page-btns{display:flex;gap:8px}
    .page-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s}
    .page-btn:hover:not(:disabled){background:var(--blue);border-color:var(--blue)}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:none;place-items:center;z-index:1000;padding:20px}
    .modal-overlay.open{display:grid}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
    .modal-head h2{font-size:16px;font-weight:700}
    .modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:14px}
    .modal-body{padding:24px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .info-block label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
    .info-block span{font-size:13px;font-weight:500}
    .section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .item-row:last-child{border-bottom:none}
    .item-name{font-size:13px;font-weight:500}
    .item-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .item-price{font-size:13px;font-weight:700;color:var(--green)}
    /* Status update form */
    .update-form{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:20px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .form-group label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px}
    .form-group select,.form-group input,.form-group textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:.15s}
    .form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--blue)}
    .form-group textarea{resize:vertical;min-height:60px}
    .btn-save{background:var(--blue);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:6px}
    .btn-save:hover{background:#3d6ae5}
    .btn-save:disabled{opacity:.5;cursor:not-allowed}
    /* Toast */
    .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(10px);transition:.3s;z-index:9999}
    .toast.show{opacity:1;transform:none}
    .toast.ok{border-color:var(--green)} .toast.err{border-color:var(--red)}
    .loading{text-align:center;padding:40px;color:var(--muted)}
    .loading i{font-size:24px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="fas fa-brain"></i><span>BrainGrasp</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="index.html"><i class="fas fa-box-open"></i> Products</a>
      <a href="orders.html" class="active"><i class="fas fa-receipt"></i> Orders</a>
      <a href="#" class="logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">📋 Orders</div>
        <div class="topbar-sub" id="orderCount">Loading...</div>
      </div>
      <div class="avatar">A</div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="placed">Placed</button>
      <button class="filter-btn" data-status="confirmed">Confirmed</button>
      <button class="filter-btn" data-status="shipped">Shipped</button>
      <button class="filter-btn" data-status="delivered">Delivered</button>
      <button class="filter-btn" data-status="cancelled">Cancelled</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search order, customer...">
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order #</th>
            <th>Customer</th>
            <th>Delivery Address</th>
            <th>Items</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Expected Delivery</th>
            <th>Ordered On</th>
          </tr>
        </thead>
        <tbody id="ordersTbody">
          <tr><td colspan="8" class="loading"><i class="fas fa-spinner"></i></td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <span class="page-info" id="pageInfo">—</span>
        <div class="page-btns">
          <button class="page-btn" id="prevBtn" disabled>← Prev</button>
          <button class="page-btn" id="nextBtn" disabled>Next →</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">Order #—</h2>
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <!-- Customer -->
        <div class="section-title">Customer & Delivery</div>
        <div class="info-grid" id="modalInfo"></div>

        <!-- Products -->
        <div class="section-title">Products Ordered</div>
        <div id="modalItems"></div>

        <!-- Totals -->
        <div id="modalTotals" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"></div>

        <!-- Update Status -->
        <div class="update-form">
          <div class="section-title">Update Order</div>
          <div class="form-row">
            <div class="form-group">
              <label>Status</label>
              <select id="statusSelect">
                <option value="Placed">Placed</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>
              </select>
            </div>
            <div class="form-group">
              <label>Delivery Date</label>
              <input type="date" id="deliveryDateInput">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:12px">
            <label>Admin Note</label>
            <textarea id="adminNoteInput" placeholder="Internal note (not shown to customer)"></textarea>
          </div>
          <button class="btn-save" id="saveStatusBtn">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('adminToken');
    if (!token) location.href = 'login.html';

    document.getElementById('logoutBtn').onclick = e => { e.preventDefault(); localStorage.removeItem('adminToken'); location.href = 'login.html'; };

    let currentStatus = 'all', currentSearch = '', currentPage = 1, totalOrders = 0;
    let currentOrderId = null;

    // Toast
    function toast(msg, type='ok') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3500);
    }

    // Format helpers
    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    const fmtRupee = n => '₹' + Number(n||0).toLocaleString('en-IN');
    function badgeClass(s) {
      const m = {placed:'b-placed',confirmed:'b-confirmed',shipped:'b-shipped',delivered:'b-delivered',cancelled:'b-cancelled',paid:'b-paid'};
      return m[(s||'').toLowerCase()] || 'b-placed';
    }

    // Load orders
    async function loadOrders() {
      document.getElementById('ordersTbody').innerHTML = '<tr><td colspan="8" class="loading"><i class="fas fa-spinner"></i></td></tr>';
      try {
        const params = new URLSearchParams({ page: currentPage, limit: 20 });
        if (currentStatus !== 'all') params.set('status', currentStatus);
        if (currentSearch) params.set('search', currentSearch);
        const res = await fetch(`${API}/api/admin/orders?${params}`, { headers: { Authorization: `Bearer ${token}` }});
        if (res.status === 401) { localStorage.removeItem('adminToken'); location.href='login.html'; return; }
        const { orders, total } = await res.json();
        totalOrders = total;
        renderTable(orders);
        document.getElementById('orderCount').textContent = `${total} order${total !== 1 ? 's' : ''} total`;
        document.getElementById('pageInfo').textContent = `Showing ${orders.length} of ${total}`;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage * 20 >= total;
      } catch (err) {
        document.getElementById('ordersTbody').innerHTML = `<tr><td colspan="8" class="no-data">Failed to load orders. Is the backend running?</td></tr>`;
      }
    }

    function renderTable(orders) {
      const tbody = document.getElementById('ordersTbody');
      if (!orders.length) { tbody.innerHTML = '<tr><td colspan="8" class="no-data">No orders found.</td></tr>'; return; }
      tbody.innerHTML = orders.map(o => {
        const addr = [o.line1, o.city, o.state, o.pincode].filter(Boolean).join(', ');
        const items = Array.isArray(o.items) ? o.items : [];
        const itemCount = items.reduce((s,i) => s+(i.quantity||1), 0);
        return `<tr data-id="${o.id}">
          <td><span class="oid">#${o.id}</span></td>
          <td><div style="font-weight:600">${o.customer_name||'Guest'}</div><div style="font-size:11px;color:var(--muted)">${o.customer_email||'—'}</div></td>
          <td style="font-size:12px;max-width:180px">${o.addr_name||''}<br><span style="color:var(--muted)">${addr||'—'}</span><br><span style="color:var(--muted)">${o.addr_phone||''}</span></td>
          <td style="font-weight:600">${itemCount} item${itemCount!==1?'s':''}</td>
          <td style="font-weight:700;color:var(--green)">${fmtRupee(o.total)}</td>
          <td><span class="badge ${badgeClass(o.status)}">${o.status||'Placed'}</span></td>
          <td style="font-size:12px">${fmtDate(o.expected_delivery)}</td>
          <td style="font-size:12px;color:var(--muted)">${fmtDate(o.created_at)}</td>
        </tr>`;
      }).join('');
      tbody.querySelectorAll('tr[data-id]').forEach(tr => tr.onclick = () => openModal(tr.dataset.id));
    }

    // Modal
    async function openModal(id) {
      currentOrderId = id;
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('modalInfo').innerHTML = '<div style="color:var(--muted);grid-column:1/-1">Loading…</div>';
      document.getElementById('modalItems').innerHTML = '';
      document.getElementById('modalTotals').innerHTML = '';
      try {
        const res = await fetch(`${API}/api/admin/orders/${id}`, { headers: { Authorization: `Bearer ${token}` }});
        const o = await res.json();
        document.getElementById('modalTitle').textContent = `Order #${o.id} · ${o.status}`;
        document.getElementById('modalInfo').innerHTML = `
          <div class="info-block"><label>Customer</label><span>${o.customer_name||'Guest'}</span></div>
          <div class="info-block"><label>Email</label><span>${o.customer_email||'—'}</span></div>
          <div class="info-block"><label>Phone</label><span>${o.addr_phone||'—'}</span></div>
          <div class="info-block"><label>Payment</label><span>${o.payment_method?.toUpperCase()||'COD'}</span></div>
          <div class="info-block" style="grid-column:1/-1"><label>Delivery Address</label>
            <span>${[o.addr_name,o.line1,o.city,o.state,o.pincode].filter(Boolean).join(', ')||'—'}</span></div>
          <div class="info-block"><label>Expected Delivery</label><span>${fmtDate(o.expected_delivery)}</span></div>
          <div class="info-block"><label>Actual Delivery</label><span>${fmtDate(o.delivery_date)}</span></div>
          <div class="info-block"><label>Order Date</label><span>${fmtDate(o.created_at)}</span></div>
          ${o.admin_note ? `<div class="info-block"><label>Admin Note</label><span>${o.admin_note}</span></div>` : ''}
        `;
        const items = Array.isArray(o.items) ? o.items : [];
        document.getElementById('modalItems').innerHTML = items.map(it => `
          <div class="item-row">
            <div><div class="item-name">${it.name||'—'}</div><div class="item-meta">Qty: ${it.quantity||1} × ${fmtRupee(it.price)}</div></div>
            <div class="item-price">${fmtRupee(it.price*(it.quantity||1))}</div>
          </div>`).join('');
        const shipping = o.total - o.subtotal;
        document.getElementById('modalTotals').innerHTML = `
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)"><span>Subtotal</span><span>${fmtRupee(o.subtotal)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:4px"><span>Shipping</span><span>${shipping>0?fmtRupee(shipping):'FREE'}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:8px"><span>Total</span><span style="color:var(--green)">${fmtRupee(o.total)}</span></div>
        `;
        // Pre-fill form
        document.getElementById('statusSelect').value = o.status||'Placed';
        document.getElementById('deliveryDateInput').value = o.delivery_date ? o.delivery_date.split('T')[0] : '';
        document.getElementById('adminNoteInput').value = o.admin_note||'';
      } catch (err) {
        document.getElementById('modalInfo').innerHTML = '<div style="color:var(--red)">Failed to load order.</div>';
      }
    }

    document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modalOverlay').onclick = e => { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); };

    // Save status
    document.getElementById('saveStatusBtn').onclick = async () => {
      if (!currentOrderId) return;
      const btn = document.getElementById('saveStatusBtn');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';
      try {
        const res = await fetch(`${API}/api/admin/orders/${currentOrderId}/status`, {
          method: 'PUT',
          headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body: JSON.stringify({
            status: document.getElementById('statusSelect').value,
            delivery_date: document.getElementById('deliveryDateInput').value || null,
            admin_note: document.getElementById('adminNoteInput').value || null
          })
        });
        if (res.ok) {
          toast('✅ Order updated successfully!', 'ok');
          document.getElementById('modalOverlay').classList.remove('open');
          loadOrders();
        } else {
          toast('❌ Failed to update order', 'err');
        }
      } catch { toast('❌ Network error', 'err'); }
      finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-save"></i> Save Changes'; }
    };

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        currentPage = 1;
        loadOrders();
      };
    });

    // Search
    let searchTimer;
    document.getElementById('searchInput').oninput = e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { currentSearch = e.target.value; currentPage = 1; loadOrders(); }, 400);
    };

    // Pagination
    document.getElementById('prevBtn').onclick = () => { currentPage--; loadOrders(); };
    document.getElementById('nextBtn').onclick = () => { currentPage++; loadOrders(); };

    loadOrders();
  </script>
</body>
</html>
