<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BrainyGrasp</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo">BrainyGrasp Admin</div>
            <nav>
                <a href="#" class="active">Products</a>
                <a href="#" id="logoutBtn">Logout</a>
            </nav>
        </aside>

        <main class="content">
            <header>
                <h1>Manage Products</h1>
                <button id="showAddFormBtn" class="btn-primary">+ Add Product</button>
            </header>

            <!-- Add Product Form (Hidden by default) -->
            <section id="addProductSection" class="card" style="display: none;">
                <h2>Add New Product</h2>
                <form id="addProductForm">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>Product Name *</label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="input-group">
                            <label>Group / Tab *</label>
                            <select name="group_name" required>
                                <option value="trending">Trending</option>
                                <option value="bestsellers">Bestsellers</option>
                                <option value="newlaunches">New Launches</option>
                                <option value="bundles">Bundles</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Price (₹) *</label>
                            <input type="number" name="price" required>
                        </div>
                        <div class="input-group">
                            <label>Original Price (₹)</label>
                            <input type="number" name="originalPrice">
                        </div>
                        <div class="input-group">
                            <label>Age Text (e.g. 3-7 Years)</label>
                            <input type="text" name="age">
                        </div>
                        <div class="input-group">
                            <label>Age Group (e.g. 3+)</label>
                            <input type="text" name="ageGroup">
                        </div>
                        <div class="input-group">
                            <label>Badge</label>
                            <select name="badge">
                                <option value="">None</option>
                                <option value="bestseller">Bestseller</option>
                                <option value="new">New</option>
                                <option value="bundle">Bundle</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Image URL *</label>
                            <input type="url" name="image" required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="cancelAddBtn" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Save Product</button>
                    </div>
                </form>
            </section>

            <!-- Product Table -->
            <section class="card">
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Group</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
