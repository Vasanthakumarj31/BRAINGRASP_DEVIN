<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in - BrainyGrasp</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Minimal page-specific tweaks */
    .auth-container{max-width:420px;margin:48px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    .auth-tabs{display:flex;gap:8px;margin-bottom:12px}
    .auth-tab{flex:1;padding:8px 10px;text-align:center;cursor:pointer;border:1px solid #e6e6e6;border-radius:6px}
    .auth-tab.active{background:#0b74ff;color:#fff;border-color:#0b74ff}
    .input-group{margin-bottom:12px}
    .otp-row{display:flex;gap:8px;justify-content:center;margin:12px 0}
    .otp-box{width:44px;height:44px;text-align:center;font-size:20px;border:1px solid #ddd;border-radius:6px}
    .muted{color:#666;font-size:13px}
  </style>
</head>
<body>
  <main class="auth-container">
    <h2 style="margin-top:0">Sign in</h2>
    <p class="muted">Sign in with your phone number or email (OTP-based)</p>

    <div class="auth-tabs">
      <div class="auth-tab active" data-method="phone">Phone</div>
      <div class="auth-tab" data-method="email">Email</div>
    </div>

    <form id="loginForm">
      <div id="authStep1">
        <div id="phoneWrap" class="input-group">
          <label for="phoneInput">Phone</label>
          <input id="phoneInput" name="phone" type="text" placeholder="Enter phone number">
        </div>

        <div id="emailWrap" class="input-group" style="display:none">
          <label for="emailInput">Email</label>
          <input id="emailInput" name="email" type="email" placeholder="Enter email address">
        </div>

        <div id="authError" class="error-msg" style="display:none;color:#c0392b;margin-bottom:8px"></div>
        <button type="button" id="sendOTPBtn" class="btn-primary">Send OTP</button>
      </div>

      <div id="authStep2" style="display:none">
        <p id="demoOTPDisplay" class="muted" style="display:none"></p>
        <p id="otpTimer" class="muted" style="display:none"></p>

        <div class="otp-row">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
          <input class="otp-box" maxlength="1" inputmode="numeric">
        </div>

        <div style="text-align:center">
          <button type="button" id="verifyOTPBtn" class="btn-primary">Verify & Continue</button>
          <button type="button" id="resendOTP" style="margin-left:8px" class="btn-link">Resend</button>
        </div>
      </div>
    </form>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
