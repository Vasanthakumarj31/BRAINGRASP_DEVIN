<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Test - BrainyGrasp</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { margin: 5px; padding: 10px; }
        .cart-display { background: #f5f5f5; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Cart Functionality Test</h1>
    
    <div class="test-section">
        <h3>Test Add to Cart</h3>
        <button onclick="testAddToCart()">Add Test Product to Cart</button>
        <button onclick="testGetCart()">Get Cart Contents</button>
        <button onclick="testClearCart()">Clear Cart</button>
    </div>

    <div class="test-section">
        <h3>Cart Contents</h3>
        <div id="cartDisplay" class="cart-display">Click "Get Cart Contents" to see cart items</div>
    </div>

    <div class="test-section">
        <h3>Cart Functions Status</h3>
        <div id="statusDisplay">Loading...</div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function testAddToCart() {
            const testProduct = {
                id: 999,
                name: 'Test Product',
                price: 100,
                image: 'https://via.placeholder.com/100'
            };
            
            if (typeof addToCart === 'function') {
                addToCart(testProduct);
                updateStatus('✅ Product added to cart');
                testGetCart();
            } else {
                updateStatus('❌ addToCart function not found');
            }
        }

        function testGetCart() {
            if (typeof getCart === 'function') {
                const cart = getCart();
                const cartDisplay = document.getElementById('cartDisplay');
                
                if (cart.length === 0) {
                    cartDisplay.innerHTML = 'Cart is empty';
                } else {
                    cartDisplay.innerHTML = cart.map(item => 
                        `<div>${item.name} - ₹${item.price} x ${item.quantity || 1}</div>`
                    ).join('');
                }
                
                updateStatus(`✅ Cart has ${cart.length} items`);
            } else {
                updateStatus('❌ getCart function not found');
            }
        }

        function testClearCart() {
            localStorage.removeItem('bg_cart');
            testGetCart();
            updateStatus('✅ Cart cleared');
        }

        function updateStatus(message) {
            document.getElementById('statusDisplay').innerHTML = message;
        }

        // Check if cart functions are available
        window.addEventListener('load', () => {
            const functions = ['getCart', 'addToCart', 'removeFromCart', 'getCartTotal'];
            const status = functions.map(func => 
                typeof window[func] === 'function' ? `✅ ${func}` : `❌ ${func}`
            ).join('<br>');
            
            updateStatus(status);
        });
    </script>
</body>
</html>
