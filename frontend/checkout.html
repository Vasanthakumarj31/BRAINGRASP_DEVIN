<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | BrainyGrasp</title>
  <meta name="description" content="Secure checkout for BrainyGrasp learning products.">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <header class="main-header" id="mainHeader">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <span class="logo-icon">BG</span>
          <span class="logo-text">Brainy<span class="logo-highlight">Grasp</span></span>
        </a>
        <div class="header-actions">
          <a href="cart.html" class="btn btn-secondary">Back to Cart</a>
        </div>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">Checkout</h1>
        <p class="section-subtitle">Complete your order details.</p>
      </div>
      <div id="checkoutEmpty" class="cart-empty">
        <i class="fas fa-shopping-bag"></i>
        <p>Your cart is empty. Add products to continue.</p>
      </div>
      <div id="checkoutSummary" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>PAYABLE:</span>
          <span id="checkoutTotal">&#8377;0</span>
        </div>
        <button type="button" class="btn-checkout" id="placeOrderBtn">PLACE ORDER</button>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
