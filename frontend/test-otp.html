<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Test - BrainyGrasp</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { margin: 5px; padding: 10px; }
        input { margin: 5px; padding: 8px; }
        .status { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>OTP Functionality Test</h1>
    
    <div class="test-section">
        <h3>Test OTP Request</h3>
        <input type="tel" id="testPhone" placeholder="9876543210" value="9876543210">
        <button onclick="testOTPRequest()">Request OTP</button>
        <button onclick="testOTPVerify()">Verify OTP</button>
    </div>

    <div class="test-section">
        <h3>OTP Input</h3>
        <div class="otp-row">
            <input class="otp-box" maxlength="1" inputmode="numeric" placeholder="1">
            <input class="otp-box" maxlength="1" inputmode="numeric" placeholder="2">
            <input class="otp-box" maxlength="1" inputmode="numeric" placeholder="3">
            <input class="otp-box" maxlength="1" inputmode="numeric" placeholder="4">
            <input class="otp-box" maxlength="1" inputmode="numeric" placeholder="5">
            <input class="otp-box" maxlength="1" inputmode="numeric" placeholder="6">
        </div>
    </div>

    <div class="test-section">
        <h3>Test Status</h3>
        <div id="statusDisplay" class="status">Ready to test...</div>
    </div>

    <div class="test-section">
        <h3>Auth Functions Status</h3>
        <div id="authStatus">Loading...</div>
    </div>

    <script src="js/auth-unified.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000';
        let demoOTP = '';

        function updateStatus(message, isError = false) {
            const statusEl = document.getElementById('statusDisplay');
            statusEl.innerHTML = message;
            statusEl.className = isError ? 'status error' : 'status success';
        }

        function testOTPRequest() {
            const phone = document.getElementById('testPhone').value;
            
            if (!phone) {
                updateStatus('❌ Please enter a phone number', true);
                return;
            }

            updateStatus('🔄 Sending OTP request...');

            // Test direct API call first
            fetch(`${API_BASE}/api/auth/request-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ method: 'phone', value: phone })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    demoOTP = data.otp_demo || '';
                    updateStatus(`✅ OTP sent successfully! Demo OTP: ${demoOTP}`);
                    
                    // Auto-fill OTP boxes for testing
                    const otpBoxes = document.querySelectorAll('.otp-box');
                    if (demoOTP && demoOTP.length === 6) {
                        demoOTP.split('').forEach((digit, index) => {
                            if (otpBoxes[index]) {
                                otpBoxes[index].value = digit;
                            }
                        });
                    }
                } else {
                    updateStatus(`❌ OTP request failed: ${data.error}`, true);
                }
            })
            .catch(err => {
                updateStatus(`❌ Network error: ${err.message}`, true);
            });
        }

        function testOTPVerify() {
            const phone = document.getElementById('testPhone').value;
            const otpBoxes = document.querySelectorAll('.otp-box');
            const otp = Array.from(otpBoxes).map(box => box.value).join('');

            if (otp.length !== 6) {
                updateStatus('❌ Please enter all 6 OTP digits', true);
                return;
            }

            updateStatus('🔄 Verifying OTP...');

            fetch(`${API_BASE}/api/auth/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ method: 'phone', value: phone, otp })
            })
            .then(response => response.json())
            .then(data => {
                if (data.token) {
                    updateStatus(`✅ OTP verified successfully! User: ${JSON.stringify(data.user)}`);
                    
                    // Test auth functions
                    if (window.AuthUnified) {
                        window.AuthUnified.storeAuth(data.token, data.user);
                        updateStatus('✅ Auth stored in unified system');
                    }
                } else {
                    updateStatus(`❌ OTP verification failed: ${data.error}`, true);
                }
            })
            .catch(err => {
                updateStatus(`❌ Network error: ${err.message}`, true);
            });
        }

        // Check auth functions availability
        window.addEventListener('load', () => {
            const authFunctions = [];
            
            if (window.AuthUnified) {
                authFunctions.push('✅ AuthUnified available');
                authFunctions.push(typeof window.AuthUnified.requestOTP === 'function' ? '✅ requestOTP' : '❌ requestOTP');
                authFunctions.push(typeof window.AuthUnified.handleVerifyOTP === 'function' ? '✅ handleVerifyOTP' : '❌ handleVerifyOTP');
                authFunctions.push(typeof window.AuthUnified.isAuthenticated === 'function' ? '✅ isAuthenticated' : '❌ isAuthenticated');
            } else {
                authFunctions.push('❌ AuthUnified not available');
            }

            document.getElementById('authStatus').innerHTML = authFunctions.join('<br>');
        });

        // Auto-advance OTP boxes
        document.addEventListener('DOMContentLoaded', () => {
            const otpBoxes = document.querySelectorAll('.otp-box');
            otpBoxes.forEach((box, index) => {
                box.addEventListener('input', (e) => {
                    if (e.target.value && index < otpBoxes.length - 1) {
                        otpBoxes[index + 1].focus();
                    }
                });
                
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        otpBoxes[index - 1].focus();
                    }
                });
            });
        });
    </script>
</body>
</html>
