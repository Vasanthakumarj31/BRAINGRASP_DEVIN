<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Debug - BrainyGrasp</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { background: #d4edda; color: #155724; padding: 10px; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; }
        .warning { background: #fff3cd; color: #856404; padding: 10px; }
    </style>
</head>
<body>
    <h1>🔍 Cart Debug Test</h1>
    
    <div class="debug-section">
        <h3>Cart Elements Check</h3>
        <div id="elementsCheck"></div>
    </div>

    <div class="debug-section">
        <h3>Cart Functionality Test</h3>
        <button onclick="testCartClick()">Test Cart Click</button>
        <button onclick="testCartOpen()">Test Cart Open</button>
        <button onclick="testCartClose()">Test Cart Close</button>
        <div id="testResults"></div>
    </div>

    <div class="debug-section">
        <h3>Manual Cart Button</h3>
        <button class="header-action-btn cart-btn" id="cartBtn">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-count">0</span>
        </button>
    </div>

    <!-- Cart Sidebar Elements -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-bag"></i> SHOPPING CART</h3>
            <button class="cart-close" id="cartClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-empty" id="cartEmpty">Your cart is empty</div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: <span id="cartTotal">₹0</span></div>
            <button class="btn btn-primary">Proceed to Checkout</button>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/common.js"></script>

    <script>
        function checkElements() {
            const results = document.getElementById('elementsCheck');
            let checks = [];
            
            const cartBtn = document.getElementById('cartBtn');
            const cartOverlay = document.getElementById('cartOverlay');
            const cartSidebar = document.getElementById('cartSidebar');
            const cartClose = document.getElementById('cartClose');
            
            checks.push(`cartBtn: ${cartBtn ? '✅ Found' : '❌ Missing'}`);
            checks.push(`cartOverlay: ${cartOverlay ? '✅ Found' : '❌ Missing'}`);
            checks.push(`cartSidebar: ${cartSidebar ? '✅ Found' : '❌ Missing'}`);
            checks.push(`cartClose: ${cartClose ? '✅ Found' : '❌ Missing'}`);
            
            const allFound = cartBtn && cartOverlay && cartSidebar && cartClose;
            
            results.innerHTML = `
                <div class="${allFound ? 'success' : 'error'}">
                    <h4>Element Status:</h4>
                    ${checks.map(check => `<div>${check}</div>`).join('')}
                    <div><strong>Overall: ${allFound ? '✅ All elements found' : '❌ Some elements missing'}</strong></div>
                </div>
            `;
            
            return allFound;
        }

        function testCartClick() {
            const results = document.getElementById('testResults');
            const cartBtn = document.getElementById('cartBtn');
            
            if (!cartBtn) {
                results.innerHTML = '<div class="error">❌ Cart button not found</div>';
                return;
            }
            
            results.innerHTML = '<div class="warning">🔄 Clicking cart button...</div>';
            cartBtn.click();
            
            setTimeout(() => {
                const cartSidebar = document.getElementById('cartSidebar');
                const isActive = cartSidebar && cartSidebar.classList.contains('active');
                results.innerHTML = `
                    <div class="${isActive ? 'success' : 'error'}">
                        Cart click test: ${isActive ? '✅ Cart opened' : '❌ Cart did not open'}
                    </div>
                `;
            }, 100);
        }

        function testCartOpen() {
            const results = document.getElementById('testResults');
            const cartOverlay = document.getElementById('cartOverlay');
            const cartSidebar = document.getElementById('cartSidebar');
            
            if (!cartOverlay || !cartSidebar) {
                results.innerHTML = '<div class="error">❌ Cart elements not found</div>';
                return;
            }
            
            cartOverlay.classList.add('active');
            cartSidebar.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            results.innerHTML = '<div class="success">✅ Cart opened manually</div>';
        }

        function testCartClose() {
            const results = document.getElementById('testResults');
            const cartOverlay = document.getElementById('cartOverlay');
            const cartSidebar = document.getElementById('cartSidebar');
            
            if (!cartOverlay || !cartSidebar) {
                results.innerHTML = '<div class="error">❌ Cart elements not found</div>';
                return;
            }
            
            cartOverlay.classList.remove('active');
            cartSidebar.classList.remove('active');
            document.body.style.overflow = '';
            
            results.innerHTML = '<div class="success">✅ Cart closed manually</div>';
        }

        // Initialize and test
        document.addEventListener('DOMContentLoaded', () => {
            checkElements();
            
            // Try to initialize cart
            if (typeof initCart === 'function') {
                initCart();
                setTimeout(() => {
                    checkElements();
                }, 100);
            } else {
                document.getElementById('elementsCheck').innerHTML += '<div class="error">❌ initCart function not found</div>';
            }
        });
    </script>
</body>
</html>
